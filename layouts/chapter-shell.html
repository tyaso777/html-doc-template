<!doctype html>
<html lang="{{DOCUMENT_LANG}}">
<head>
<!--
  Security note:
  CDN assets should use integrity and crossorigin="anonymous" whenever possible.
  Some CDN assets below intentionally keep TODO comments instead of unverified SRI values,
  because an incorrect integrity value blocks the asset from loading.
-->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{DOCUMENT_TITLE}}</title>

  <!-- Prism.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/themes/prism.min.css" integrity="sha512-tN7Ec6zAFaVSG3TpNAKtk4DOHNpSwKHxxrsiw4GHKESGPs5njn/0sMCUMl2svV4wo4BK/rCP7juYz+zx+l6oeQ==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Library config -->
  <script>
    window.Prism = window.Prism || {};
    window.Prism.manual = true;

    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>

  <!-- External libraries -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/prism.min.js" integrity="sha512-HiD3V4nv8fcjtouznjT9TqDNDm1EXngV331YGbfVGeKUoH+OLkRTCMzA34ecjlgSQZpdHZupdSrqHY+Hz3l6uQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-svg.js" integrity="sha256-1CldwzdEg2k1wTmf7s5RWVd7NMXI/7nxxjJM2C4DqII=" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <link rel="stylesheet" href="{{ASSET_PREFIX}}assets/css/technical-doc.css">
</head>

<body class="line-numbers document-page">
  <div class="layout">
    <aside class="sidebar" aria-label="Document navigation">
      <header class="sidebar-header" aria-labelledby="sidebar-title">
        <h2 id="sidebar-title" class="sidebar-title">{{SIDEBAR_TITLE}}</h2>
        <p class="sidebar-subtitle">{{SIDEBAR_SUBTITLE}}</p>
      </header>

      <details class="nav-section" open>
        <summary>Contents</summary>
        <div class="nav-body">
          <ol class="nav-list site-contents-tree">
{{CONTENTS_TREE}}
          </ol>
        </div>
      </details>

{{MATERIALS_SECTION}}
{{EXTERNAL_LINKS_SECTION}}
    </aside>

    <main>
      <article class="content">
{{CONTENT}}
      </article>
    </main>
  </div>

  <script defer src="{{ASSET_PREFIX}}assets/js/technical-doc.js"></script>
</body>
</html>
